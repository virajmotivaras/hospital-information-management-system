<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Change Password | Hospital Management</title>
    <link rel="stylesheet" href="/static/css/base.css">
    <link rel="stylesheet" href="/static/css/login.css">
  </head>
  <body class="login-page">
    <main class="login-card">
      <div class="brand compact">
        <span class="brand-mark">H</span>
        <div>
          <strong>Change Password</strong>
          <small>{% if must_change_password %}Required before continuing{% else %}Update your password{% endif %}</small>
        </div>
      </div>
      <form method="post">
        {% csrf_token %}
        {% if error %}<div class="login-error">{{ error }}</div>{% endif %}
        <label>
          Current password
          <input name="current_password" type="password" autocomplete="current-password" required autofocus>
        </label>
        <label>
          New password
          <input name="new_password" type="password" autocomplete="new-password" required>
        </label>
        <label>
          Confirm new password
          <input name="confirm_password" type="password" autocomplete="new-password" required>
        </label>
        <button class="primary" type="submit">Save Password</button>
      </form>
    </main>
  </body>
</html>
